<!DOCTYPE html>
<html>
<head>
  <title>Voice Comparison</title>

  <style>

    body{
      margin:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      font-family:Arial;
    }

    .container{
      position:relative;
      width:100%;
      max-width:1000px;
    }

    .bg{
      width:100%;
      display:block;
    }

.prButton{
  position:absolute;
  left:6%;
  top:33.5%;
  width:39%;
  height:14%;
  cursor:pointer;

  border:2px solid rgba(0,255,140,0.65);
  border-radius:18px;

  background:rgba(0,255,140,0.08);

  box-shadow:
    0 0 18px rgba(0,255,140,0.35);

  transition:all 0.2s ease;
}

.prButton:hover{
  background:rgba(0,255,140,0.16);

  box-shadow:
    0 0 28px rgba(0,255,140,0.55);
}

.elButton{
  position:absolute;
  left:53%;
  top:33.5%;
  width:39%;
  height:14%;
  cursor:pointer;

  border:2px solid rgba(255,140,0,0.55);
  border-radius:18px;

  background:rgba(255,140,0,0.06);

  box-shadow:
    0 0 18px rgba(255,140,0,0.25);

  transition:all 0.2s ease;
}

.elButton:hover{
  background:rgba(255,140,0,0.14);

  box-shadow:
    0 0 28px rgba(255,140,0,0.45);
}

  </style>
</head>

<body>

<div class="container">

  <img src="comparison.png" class="bg">

  <audio id="prAudio" src="personarealis.mp3"></audio>
  <audio id="elAudio" src="elevenlabs.mp3"></audio>

  <div class="prButton"
       onclick="document.getElementById('prAudio').play()">
  </div>

  <div class="elButton"
       onclick="document.getElementById('elAudio').play()">
  </div>

</div>

</body>
</html>
