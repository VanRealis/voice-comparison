<!DOCTYPE html>
<html>
<head>
  <title>Voice Comparisons</title>

  <style>
    body{
      margin:0;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      font-family:Arial;
    }

    .container{
      position:relative;
      width:100%;
      max-width:1000px;
    }

    .bg{
      width:100%;
      display:block;
    }

    .prButton{
      position:absolute;
      left:6%;
      top:33.5%;
      width:39%;
      height:14%;
      cursor:pointer;
    }

    .elButton{
      position:absolute;
      left:53%;
      top:33.5%;
      width:39%;
      height:14%;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="container">

  <img src="comparison.png" class="bg">

<audio id="prAudio" preload="auto" src="personarealis.mp3"></audio>
<audio id="elAudio" preload="auto" src="elevenlabs.mp3"></audio>

  <div class="prButton" onclick="playPR()"></div>

<div class="elButton" onclick="playEL()"></div>

</div>
  
<script>
const prAudio = document.getElementById('prAudio');
const elAudio = document.getElementById('elAudio');

function playPR(){
  elAudio.pause();
  elAudio.currentTime = 0;

  prAudio.pause();
  prAudio.currentTime = 0;
  prAudio.load();
  prAudio.play();
}

function playEL(){
  prAudio.pause();
  prAudio.currentTime = 0;

  elAudio.pause();
  elAudio.currentTime = 0;
  elAudio.load();
  elAudio.play();
}
</script>
</body>
</html>
